name: TraceRazor CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: check, test, clippy ────────────────────────────────────────────────
  rust:
    name: Rust (check + test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace
        # No OPENAI_API_KEY — Phase 2 metrics are skipped gracefully

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  # ── Dashboard: build ─────────────────────────────────────────────────────────
  dashboard:
    name: Dashboard (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: npm install
        run: npm ci

      - name: npm build
        run: npm run build

  # ── TAS gate: run sample trace and fail if score < 60 ────────────────────────
  tas-gate:
    name: TAS Gate (sample trace)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build CLI
        run: cargo build -p tracerazor --release

      - name: Run TAS gate on sample trace
        run: |
          ./target/release/tracerazor audit \
            --file traces/support-agent-run-2847.json \
            --threshold 60
        # Exit code 1 if TAS < threshold — fails the build
